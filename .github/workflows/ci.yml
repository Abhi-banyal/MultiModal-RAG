name: CI

# Run CI for every pull request and for code pushed to the production branch.
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      # Download the repository contents into the GitHub Actions runner.
      - name: Check out repository
        uses: actions/checkout@v4

      # Use the same Python version locally and in CI for repeatable results.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Install system packages used by OCR and PDF/image processing code.
      - name: Install backend system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0 tesseract-ocr

      # Install FastAPI backend dependencies from the detected requirements file.
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            python -m pip install .
          else
            echo "No requirements.txt or pyproject.toml found. Add one before enabling stricter backend CI."
          fi

      # Import the FastAPI application without reading or committing any real .env secrets.
      - name: Verify backend imports
        env:
          USE_AZURE_OPENAI: "false"
          USE_OPENAI_VISION: "false"
          VECTOR_STORE: "local"
          QDRANT_LOCAL_PATH: "/tmp/multimodal-rag-ci-qdrant"
        run: |
          python -c "from app.main import app; print(f'Imported FastAPI app: {app.title}')"

      # Run tests only when a tests directory exists. Add backend tests under tests/ to enable this step.
      - name: Run backend tests when available
        env:
          USE_AZURE_OPENAI: "false"
          USE_OPENAI_VISION: "false"
          VECTOR_STORE: "local"
          QDRANT_LOCAL_PATH: "/tmp/multimodal-rag-ci-qdrant"
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests/ directory found. Add pytest tests under tests/ for backend coverage."
          fi

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # Download the repository contents into the GitHub Actions runner.
      - name: Check out repository
        uses: actions/checkout@v4

      # Use a current LTS Node.js release for Vite and React builds.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # npm ci installs exactly what is recorded in package-lock.json.
      - name: Install frontend dependencies
        run: npm ci

      # Run lint only if a lint script exists in package.json.
      - name: Run frontend lint when available
        run: |
          if node -e "const pkg = require('./package.json'); process.exit(pkg.scripts && pkg.scripts.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No npm lint script found. Add a \"lint\" script to frontend/package.json to enable linting."
          fi

      # Build the production Vite bundle.
      - name: Build frontend
        env:
          VITE_API_BASE_URL: "http://127.0.0.1:8000"
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    # These values come from GitHub repository secrets. They stay empty for forks or repos that have not configured Docker Hub publishing.
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }}

    steps:
      # Download the repository contents into the GitHub Actions runner.
      - name: Check out repository
        uses: actions/checkout@v4

      # Set up Docker Buildx for reliable layer caching and multi-platform-capable builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image on every CI run to catch Dockerfile and dependency issues.
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: multimodal-rag:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Authenticate only when Docker Hub secrets are configured.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' && env.DOCKER_IMAGE_NAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      # Push only from main after a successful build and only when all Docker Hub secrets exist.
      - name: Push Docker image to Docker Hub
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' && env.DOCKER_IMAGE_NAME != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Explain why no image was pushed when publishing secrets are not set.
      - name: Skip Docker push when secrets are missing
        if: ${{ env.DOCKER_USERNAME == '' || env.DOCKER_PASSWORD == '' || env.DOCKER_IMAGE_NAME == '' }}
        run: echo "Docker image build passed. Skipping Docker Hub push because one or more Docker secrets are not configured."
