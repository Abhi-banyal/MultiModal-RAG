
name: CI

# Run CI for every pull request and for code pushed to the main branch.
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      # Download the repository contents into the GitHub Actions runner.
      - name: Check out repository
        uses: actions/checkout@v4

      # Use the same Python version locally and in CI for repeatable results.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Install system packages used by OCR and PDF/image processing code.
      - name: Install backend system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0 tesseract-ocr

      # Install production dependencies and test/dev dependencies.
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            python -m pip install .
          else
            echo "No requirements.txt or pyproject.toml found. Add one before enabling stricter backend CI."
          fi

          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          else
            echo "requirements-dev.txt not found. Installing basic test dependencies."
            python -m pip install pytest httpx
          fi

      # Import the FastAPI application without requiring real .env secrets.
      - name: Verify backend imports
        env:
          USE_AZURE_OPENAI: "false"
          USE_OPENAI_VISION: "false"
          VECTOR_STORE: "local"
          QDRANT_LOCAL_PATH: "/tmp/multimodal-rag-ci-qdrant"
        run: |
          python -c "from app.main import app; print(f'Imported FastAPI app: {app.title}')"

      # Run tests only when a tests directory exists.
      - name: Run backend tests when available
        env:
          USE_AZURE_OPENAI: "false"
          USE_OPENAI_VISION: "false"
          VECTOR_STORE: "local"
          QDRANT_LOCAL_PATH: "/tmp/multimodal-rag-ci-qdrant"
        run: |
          if [ -d tests ]; then
            python -m pytest -q
          else
            echo "No tests/ directory found. Add pytest tests under tests/ for backend coverage."
          fi

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # Download the repository contents into the GitHub Actions runner.
      - name: Check out repository
        uses: actions/checkout@v4

      # Use a current Node.js release for Vite and React builds.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # npm ci installs exactly what is recorded in package-lock.json.
      - name: Install frontend dependencies
        run: npm ci

      # Run lint only if a lint script exists in package.json.
      - name: Run frontend lint when available
        run: |
          if node -e "const pkg = require('./package.json'); process.exit(pkg.scripts && pkg.scripts.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No npm lint script found. Add a \"lint\" script to frontend/package.json to enable linting."
          fi

      # Build the production Vite bundle.
      - name: Build frontend
        env:
          VITE_API_BASE_URL: "http://127.0.0.1:8000"
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    env:
      DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME }}

    steps:
      # Download the repository contents into the GitHub Actions runner.
      - name: Check out repository
        uses: actions/checkout@v4

      # Validate Docker publishing settings when publishing is configured.
      - name: Validate Docker image settings
        run: |
          if [ -z "$DOCKER_USERNAME" ] && [ -z "$DOCKER_PASSWORD" ] && [ -z "$DOCKER_IMAGE_NAME" ]; then
            echo "Docker publishing is not configured. The workflow will only build the image."
            exit 0
          fi

          if [ -z "$DOCKER_USERNAME" ] || [ -z "$DOCKER_PASSWORD" ] || [ -z "$DOCKER_IMAGE_NAME" ]; then
            echo "Docker publishing is partially configured."
            echo "Required values:"
            echo "- vars.DOCKER_USERNAME"
            echo "- secrets.DOCKER_PASSWORD"
            echo "- vars.DOCKER_IMAGE_NAME"
            exit 1
          fi

          if [[ "$DOCKER_USERNAME" =~ [A-Z] ]]; then
            echo "DOCKER_USERNAME must be lowercase."
            exit 1
          fi

          if [[ "$DOCKER_IMAGE_NAME" =~ [A-Z] ]]; then
            echo "DOCKER_IMAGE_NAME must be lowercase."
            exit 1
          fi

          if [[ "$DOCKER_IMAGE_NAME" == *"/"* || "$DOCKER_IMAGE_NAME" == *":"* ]]; then
            echo "DOCKER_IMAGE_NAME should be only the repository name, for example: multimodal-rag"
            exit 1
          fi

          echo "Docker image settings are valid."
          echo "Image will be: docker.io/$DOCKER_USERNAME/$DOCKER_IMAGE_NAME"

      # Build the Docker image on every CI run.
      - name: Build Docker image
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_IMAGE_NAME" ]; then
            IMAGE_NAME="docker.io/$DOCKER_USERNAME/$DOCKER_IMAGE_NAME"
            docker build \
              -t "$IMAGE_NAME:latest" \
              -t "$IMAGE_NAME:${GITHUB_SHA}" \
              .
          else
            docker build -t multimodal-rag:ci .
          fi

      # Log in to Docker Hub only when Docker publishing is configured.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' && env.DOCKER_IMAGE_NAME != '' }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      # Push only from main branch after backend, frontend, and Docker build pass.
      - name: Push Docker image to Docker Hub
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' && env.DOCKER_IMAGE_NAME != '' }}
        run: |
          IMAGE_NAME="docker.io/$DOCKER_USERNAME/$DOCKER_IMAGE_NAME"

          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:${GITHUB_SHA}"

      # Explain why image was not pushed.
      - name: Skip Docker push when secrets or variables are missing
        if: ${{ env.DOCKER_USERNAME == '' || env.DOCKER_PASSWORD == '' || env.DOCKER_IMAGE_NAME == '' }}
        run: |
          echo "Docker image build passed."
          echo "Skipping Docker Hub push because Docker publishing settings are not fully configured."